<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/amanah-logo.png" />
    <link rel="apple-touch-icon" href="/assets/amanah-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a2e1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>%VITE_APP_TITLE%</title>
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="AmanahLife" />

    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <style>
      [data-atoms-badge],[class*="atoms-badge"],[id*="atoms-badge"],[class*="AtomsBadge"],[id*="AtomsBadge"],a[href*="atoms.com"][style*="fixed"],div[style*="fixed"][style*="bottom"][style*="right"]>a[href*="atoms"],iframe[src*="atoms"],#atoms-watermark,.atoms-watermark{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}
    </style>
  </head>

  <body>
    <script>
      // Apply theme immediately to prevent flash of wrong theme
      (function() {
        var theme = localStorage.getItem('amanah-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (!theme) {
          // Default to dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
